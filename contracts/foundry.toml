[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "shanghai"

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[rpc_endpoints]
cross_mainnet = "${CROSS_RPC_URL}"
cross_testnet = "${CROSS_TESTNET_RPC_URL}"

[etherscan]
cross_mainnet = { key = "${CROSS_EXPLORER_KEY}", url = "${CROSS_EXPLORER_URL}" }
