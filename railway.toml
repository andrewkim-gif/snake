# ============================================================
# AI World War — Railway Deployment Configuration
# ============================================================
# Go server built via Docker multi-stage (server/Dockerfile)
# Project: https://snake-production-3b4e.up.railway.app

[build]
builder = "dockerfile"
dockerfilePath = "server/Dockerfile"
watchPatterns = ["server/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
